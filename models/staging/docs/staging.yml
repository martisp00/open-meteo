version: 2

models:
  - name: stg_locations
    description: "Cleaned city metadata and coordinates from the geocoding API. One row per city."
    columns:
      - name: city_name
        description: "City name, used as the natural key across the project."
        tests: [not_null, unique]
      - name: country_code
        description: "Two letter ISO country code."
        tests: [not_null]

  - name: stg_weather_daily
    description: "Recent daily weather per city (past ~90 days). Renamed and cast from the raw pull."
    columns:
      - name: city_name
        tests: [not_null]
      - name: date
        description: "Calendar date of the weather observation."
        tests: [not_null]

  - name: stg_forecast_daily
    description: "Daily weather forecast per city (next 7 days)."
    columns:
      - name: city_name
        tests: [not_null]
      - name: date
        description: "Calendar date the forecast is for."
        tests: [not_null]

  - name: stg_air_quality_hourly
    description: "Hourly air quality per city. Raw 'timestamp' renamed to 'datetime' (timestamp is a SQL keyword)."
    columns:
      - name: city_name
        tests: [not_null]
      - name: datetime
        description: "Hour of the air quality reading."
        tests: [not_null]
